# 工会门户 Nginx 配置
# 文件路径: /etc/nginx/sites-available/union-portal

server {
    listen 80;
    server_name _;  # 使用 IP 地址或域名

    # 日志配置
    access_log /var/log/nginx/union-portal-access.log;
    error_log /var/log/nginx/union-portal-error.log;

    # 客户端上传大小限制（100MB，支持视频上传）
    client_max_body_size 100M;

    # 字符集（支持中文文件名）
    charset utf-8;

    # 静态文件缓存 - Next.js 静态资源
    location /_next/static {
        alias /var/www/union-portal/.next/static;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # 图片和公共文件缓存
    location /public {
        alias /var/www/union-portal/public;
        expires 30d;
        add_header Cache-Control "public";
    }

    # 上传文件目录
    location /uploads {
        alias /var/www/union-portal/public/uploads;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Next.js 应用反向代理
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # 传递真实 IP
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 健康检查端点
    location /health {
        proxy_pass http://localhost:3000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}

